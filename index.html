<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Pipeline Demo</title>

    <!-- Prevent caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 2.8em;
        }

        .badge {
            background: #4CAF50;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 15px;
            font-size: 1.1em;
        }

        .update-box {
            background: #ff4d4d;
            padding: 12px;
            margin-top: 20px;
            border-radius: 6px;
            display: inline-block;
            font-weight: bold;
        }

        .info {
            margin-top: 25px;
            font-size: 1.1em;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.6);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚀 CI/CD Pipeline Demo</h1>

    <p>Jenkins + Ansible + AWS EC2</p>

    <div class="badge">
        ✔ Deployment Successful
    </div>

    <div class="update-box">
        🔴 NEW VERSION DEPLOYED
    </div>

    <div class="info">
        <p><strong>Triggered via Jenkins</strong></p>
        <p>Updated at: <span id="time"></span></p>
        <p>Deployed by Kuldeep 🚀</p>
    </div>
</div>

<footer>
    <p>DevOps Project | CI/CD Pipeline</p>
</footer>

<script>
    document.getElementById("time").innerText = new Date().toLocaleString();
</script>

</body>
</html>
