---
- name: Deploy website to EC2 (Ubuntu)
  hosts: all
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Apache (apache2)
      apt:
        name: apache2
        state: present

    - name: Copy index.html to server
      copy:
        src: ./index.html
        dest: /var/www/html/index.html
        mode: '0644'

    - name: Ensure Apache is running
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Restart Apache
      service:
        name: apache2
        state: restarted